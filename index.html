<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skyblue bot v1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
        body {
            background-color: #222; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; position: relative; overflow: hidden;
        }

        /* 🌟 모던 시작 메뉴 스타일 (사진 감성 + 네온 모던) */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #111; /* 사진처럼 아주 어두운 배경 */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .start-content {
            text-align: center;
            animation: fadeIn 1.2s ease-out forwards;
        }
        .start-title {
            color: skyblue;
            font-size: 52px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 50px;
            /* 모던한 네온 글로우 효과 */
            text-shadow: 0 0 10px rgba(135, 206, 235, 0.4), 0 0 20px rgba(135, 206, 235, 0.2);
        }
        .start-btn {
            background: transparent;
            color: white;
            border: 2px solid white;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        /* START 버튼 마우스 호버 효과 */
        .start-btn:hover {
            background: white;
            color: #111;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 기존 체스판 및 UI 스타일 */
        #main-game-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; /* 처음엔 숨김 */
            transition: opacity 0.8s ease;
        }
        #top-bar {
            width: 400px; background-color: #232323; padding: 10px;
            text-align: center; font-weight: bold; font-size: 14px;
            border-radius: 5px 5px 0 0; box-sizing: border-box; border-bottom: 1px solid #444;
        }
        #opening-name {
            width: 400px; background-color: #232323; color: #f0d9b5;
            text-align: center; font-size: 13px; font-style: italic;
            padding: 5px; box-sizing: border-box; border-bottom: 2px solid #444;
        }
        #control-panel {
            width: 400px; background-color: #2a2a2a; padding: 8px; box-sizing: border-box;
            display: flex; justify-content: center;
        }
        #resign-btn {
            background-color: #d9534f; color: white; border: none; padding: 8px 20px;
            font-size: 14px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s;
        }
        #resign-btn:hover { background-color: #c9302c; }
        #myBoard { width: 400px; }
        #status {
            margin-top: 15px; font-size: 18px; color: skyblue; font-weight: bold;
        }
        #checkmate-banner {
            display: none; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 38px; font-weight: 900; color: #ff3333; text-align: center;
            text-shadow: 4px 4px 20px rgba(0,0,0,0.9), -1px -1px 0 #fff;
            z-index: 2000; pointer-events: none; letter-spacing: 1px; width: 90%; line-height: 1.3;
        }
        #analysis-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #333; padding: 30px; border-radius: 10px; width: 350px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .modal-content h2 { margin-top: 0; color: #f0d9b5; }
        .stat-row {
            display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #444; font-weight: bold;
        }
        .stat-row:last-child { border-bottom: none; }
        .btn-restart {
            margin-top: 20px; background-color: #5cb85c; color: white; border: none;
            padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;
        }
        .btn-restart:hover { background-color: #4cae4c; }
        #progress-bar { width: 100%; background: #222; border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
        #progress-fill { height: 10px; background: skyblue; width: 0%; transition: width 0.1s; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="start-content">
            <div class="start-title">sky blue bot</div>
            <button class="start-btn" onclick="startChessGame()">START</button>
        </div>
    </div>

    <div id="main-game-container">
        <div id="top-bar">Game History: <span id="history">Game Start</span></div>
        <div id="opening-name">Starting Position</div>
        <div id="control-panel">
            <button id="resign-btn" onclick="triggerGameOver('Resignation')">Resign</button>
        </div>
        
        <div id="checkmate-banner"></div>
        <div id="myBoard"></div>
        <div id="status">skyblue bot v1</div>
    </div>

    <div id="analysis-modal">
        <div class="modal-content">
            <h2 id="modal-title">Analyzing Game...</h2>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <div id="stats-container" style="display: none;">
                <div class="stat-row" style="color:#1baca6"><span>Brilliant</span><span id="stat-brilliant">0</span></div>
                <div class="stat-row" style="color:#5c8bb0"><span>Great Move</span><span id="stat-great">0</span></div>
                <div class="stat-row" style="color:#96bc4b"><span>Best Move</span><span id="stat-best">0</span></div>
                <div class="stat-row" style="color:#96bc4b"><span>Excellent</span><span id="stat-excellent">0</span></div>
                <div class="stat-row" style="color:#b5b85c"><span>Good</span><span id="stat-good">0</span></div>
                <div class="stat-row" style="color:#d4a46a"><span>Book Move</span><span id="stat-book">0</span></div>
                <div class="stat-row" style="color:#f2da66"><span>Inaccuracy</span><span id="stat-inaccuracy">0</span></div>
                <div class="stat-row" style="color:#e88c3a"><span>Mistake</span><span id="stat-mistake">0</span></div>
                <div class="stat-row" style="color:#ca3431"><span>Miss</span><span id="stat-miss">0</span></div>
                <div class="stat-row" style="color:#ca3431"><span>Blunder</span><span id="stat-blunder">0</span></div>
                <button class="btn-restart" onclick="location.reload()">Start New Game</button>
            </div>
        </div>
    </div>

    <script>
        function startChessGame() {
            var startScreen = document.getElementById('start-screen');
            var mainGame = document.getElementById('main-game-container');
            
            // 1. 시작 화면 페이드 아웃
            startScreen.style.opacity = '0';
            
            setTimeout(function() {
                // 2. 시작 화면 완전히 숨기고 메인 게임 표시
                startScreen.style.visibility = 'hidden';
                mainGame.style.opacity = '1';
                
                // (선택사항) 시작할 때 보드 크기 꼬이는 현상 방지
                if(typeof board !== 'undefined') {
                    board.resize();
                }
            }, 600);
        }
    </script>

    <script src="bot.js"></script>

</body>
</html>
